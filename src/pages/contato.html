<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Contato - Motor Nimbus</title>
    <link rel="stylesheet" href="../css/estilo.css">
</head>
<body class="pagina-contato">
    <main>
        <header>
            <a href="../../index.html">
                <img src="../src/assets/logo.PNG" alt="logo" id="logo">
            </a>
            <nav>
                <ul>
                    <li><a href="../../index.html">Home</a></li>
                    <li><a href="./portifolio.html">Portifólio</a></li>
                    <li><a href="./sobre.html">Sobre</a></li>
                    <li><a href="contato.html">Contato</a></li>
                </ul>
            </nav>
        </header>

        <form action="">
            <fieldset>
                <legend>Formulário de Contato</legend>

                <label for="name">Nome</label>
                <input type="text" id="name" placeholder="Seu nome">

                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="Seu e-mail">

                <label for="descricao">Descrição</label>
                <textarea id="descricao" placeholder="Sua mensagem"></textarea>

                <button type="submit">Enviar</button>
            </fieldset>
        </form>

    </main>

    <footer>
        <div class="footer-grid">

            <div class="footer-col">
                <h3>Contato</h3>
                <a>contato@motornimbus.com</a>
                <a>(11) 99999-9999</a>
            </div>

            <div class="footer-col">
                <h3>Redes Sociais</h3>
                <a href="#">Instagram</a>
                <a href="#">Facebook</a>
                <a href="#">LinkedIn</a>

            </div>

            <div class="footer-col">
                <h3>Navegação</h3>

                <a href="portifolio.html">Portifólio</a>
                <a href="sobre.html">Sobre</a>

        </div>

        <div class="footer-divider"></div>

        <p class="footer-bottom"> &copy; 2025 <span>Motor Nimbus</span> — Todos os direitos reservados</p>
